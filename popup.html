<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>Strict Focus — Focus Mode</title>
  <link rel="stylesheet" href="popup.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
  <div class="container">
    <header class="popup-header">
      <p class="eyebrow">STRICT FOCUS</p>
      <h1>Focus Mode</h1>
    </header>

    <div class="card link" id="lists-link">
      <div class="card-content">
        <div class="title">Focus Rules</div>
        <div class="small" id="list-summary">–</div>
      </div>
      <div class="chevron">›</div>
    </div>

    <div id="active" class="active hidden">
      <p class="eyebrow session-eyebrow">FOCUS SESSION ACTIVE</p>
      <div class="mode-badge" id="active-mode-label">Keep selected sites open</div>
      <div class="ring">
        <svg viewBox="0 0 160 160" width="200" height="200" aria-hidden="true">
          <circle class="track" cx="80" cy="80" r="70"></circle>
          <circle class="progress" id="progress" cx="80" cy="80" r="70"></circle>
          <text id="time" x="80" y="88" text-anchor="middle">--:--</text>
        </svg>
      </div>
      <p class="mode-copy active-copy" id="active-mode-copy"></p>
    </div>

    <div id="start" class="start">
      <div class="mode-switch" role="radiogroup" aria-label="Focus mode">
        <button type="button" class="mode-button active" data-mode="allow" role="radio" aria-checked="true"><span class="mode-button-label">Allow Only</span></button>
        <button type="button" class="mode-button" data-mode="blocked" role="radio" aria-checked="false"><span class="mode-button-label">Block Only</span></button>
      </div>
      <p class="mode-copy" id="mode-copy">Only sites on your Allow List stay available during this session</p>
      <p class="duration-label">Choose a duration</p>
      <div class="grid">
        <button data-mins="1">1 min</button>
        <button data-mins="10">10 mins</button>
        <button data-mins="20">20 mins</button>
        <button data-mins="30">30 mins</button>
        <button data-mins="60">1 hour</button>
        <button data-mins="120">2 hours</button>
        <button data-mins="180">3 hours</button>
        <button data-mins="240">4 hours</button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
