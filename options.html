<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>Strict Focus — Focus Rules</title>
  <link rel="stylesheet" href="options.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
  <div class="container">
    <div class="page-head">
      <div>
        <p class="eyebrow">STRICT FOCUS</p>
        <h1>Focus Rules</h1>
        <p class="subtitle" id="subtitle">Choose the sites that remain available while you focus.</p>
        <p class="note">You can paste a full URL — only its domain will be used.</p>
      </div>

      <div class="head-actions">
        <button id="visibilityBtn" class="icon-btn hidden-control" type="button" aria-label="Show Block List" title="Show Block List" aria-pressed="false">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6S2 12 2 12z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
        <button id="settingsBtn" class="icon-btn" aria-label="More options" title="More options">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="5" cy="12" r="1.5" fill="currentColor" stroke="none"></circle>
            <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"></circle>
            <circle cx="19" cy="12" r="1.5" fill="currentColor" stroke="none"></circle>
          </svg>
        </button>
      </div>

      <div id="settingsMenu" class="settings-menu hidden" role="menu" aria-label="Settings menu">
        <button id="clearAll" class="settings-item" role="menuitem">Clear open sites</button>
        <button id="donate" class="settings-item" role="menuitem">Donate</button>
      </div>
    </div>

    <div class="tabs" role="tablist" aria-label="Focus rule modes">
      <button id="allowTab" class="tab active" type="button" data-tab="allow" aria-selected="true">Allow Only</button>
      <button id="blockedTab" class="tab" type="button" data-tab="blocked" aria-selected="false">Block Only</button>
    </div>

    <label class="field-label" id="domainLabel" for="domain">Allow List</label>
    <div class="input-row">
      <input id="domain" type="text" placeholder="e.g. chatgpt.com">
      <button id="add" type="button">Add site</button>
    </div>

    <div id="listWrap" class="list-wrap">
      <div class="list-heading" id="listHeading">Allow List</div>
      <div id="listMask" class="list-mask hidden">
        <strong>Block List is hidden</strong>
        <span>Use the eye button above to show it</span>
      </div>
      <ul id="list"></ul>
    </div>
  </div>

  <script src="options.js"></script>
</body>

</html>
