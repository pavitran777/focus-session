<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>Strict Session - Access Rules</title>
  <link rel="stylesheet" href="options.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
  <div class="container">
    <div class="page-head">
      <div>
        <h1>Access Rules</h1>
        <p class="subtitle" id="subtitle">Add the sites you want available during a Strict Session.</p>
        <p class="note">You can paste a full URL. Only the domain will be used.</p>
      </div>

      <div class="head-actions">
        <button id="visibilityBtn" class="icon-btn hidden-control" aria-label="Show blocked list" title="Show blocked list">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6S2 12 2 12z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>

        <button id="settingsBtn" class="icon-btn" aria-label="Settings" title="Settings">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3.25l1.2 1.01 1.59-.14.78 1.4 1.5.56-.16 1.56 1.04 1.18-1.04 1.18.16 1.56-1.5.56-.78 1.4-1.59-.14L12 18.75l-1.2-1.01-1.59.14-.78-1.4-1.5-.56.16-1.56L6.05 12l1.04-1.18-.16-1.56 1.5-.56.78-1.4 1.59.14L12 3.25z"></path>
            <circle cx="12" cy="12" r="2.85"></circle>
          </svg>
        </button>
      </div>

      <div id="settingsMenu" class="settings-menu hidden" role="menu" aria-label="Settings menu">
        <button id="clearAll" class="settings-item" role="menuitem">Clear Allow List</button>
        <button id="donate" class="settings-item" role="menuitem">Donate</button>
      </div>
    </div>

    <div class="tabs" role="tablist" aria-label="Access Rules tabs">
      <button id="allowTab" class="tab active" type="button" data-tab="allow" aria-selected="true">Allow List</button>
      <button id="blockedTab" class="tab" type="button" data-tab="blocked" aria-selected="false">Blocked List</button>
    </div>

    <div class="input-row">
      <input id="domain" type="text" placeholder="e.g. chatgpt.com">
      <button id="add" type="button">+</button>
    </div>

    <div id="listWrap" class="list-wrap">
      <div id="listMask" class="list-mask hidden">
        <strong>Blocked List is hidden.</strong>
        <span>Click the eye icon to show it.</span>
      </div>
      <ul id="list"></ul>
    </div>
  </div>

  <script src="options.js"></script>
</body>

</html>
